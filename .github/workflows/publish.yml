name: Build PDFs and publish Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install document and browser libraries
        run: pip install weasyprint==68.0 pypdf==6.1.1 playwright==1.55.0
      - name: Build and validate PDFs
        run: python scripts/build_pdfs.py
      - name: Commit generated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/*.pdf artifact-manifest.json qa/validation.json
          git diff --cached --quiet || git commit -m "Build verified campaign PDFs"
          git push
      - id: pages
        name: Configure GitHub Pages
        continue-on-error: true
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        name: Deploy GitHub Pages
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - id: publication_audit
        name: Audit publication outcome
        if: always()
        continue-on-error: true
        env:
          PAGES_OUTCOME: ${{ steps.pages.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          SITE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          python - <<'PY'
          import json, os, time
          from pathlib import Path
          from urllib.request import Request, urlopen

          root = Path('.')
          page_outcome = os.environ.get('PAGES_OUTCOME', 'unknown')
          deploy_outcome = os.environ.get('DEPLOY_OUTCOME', 'unknown')
          site_url = os.environ.get('SITE_URL', '').rstrip('/') + '/'
          routes = [
              '', 'resume.html', 'cover-letter.html', 'interview-brief.html',
              '90-day-plan.html', 'agent-load-path-review.html', 'contribution-case.html',
              'docs/Russell-Dudek-Accenture-Resume.pdf',
              'docs/Russell-Dudek-Accenture-Cover-Letter.pdf',
              'docs/Russell-Dudek-Accenture-Interview-Brief.pdf',
              'docs/Russell-Dudek-Accenture-90-Day-Plan.pdf',
              'docs/Russell-Dudek-Agent-Load-Path-Review.pdf',
              'docs/Russell-Dudek-Accenture-Contribution-Case.pdf',
          ]
          results = []
          if deploy_outcome == 'success' and site_url.startswith('http'):
              for attempt in range(18):
                  try:
                      with urlopen(Request(site_url, headers={'User-Agent':'Candidate campaign publication audit'}), timeout=20) as r:
                          if r.status == 200:
                              break
                  except Exception:
                      if attempt == 17:
                          break
                      time.sleep(5)
              for route in routes:
                  try:
                      with urlopen(Request(site_url + route, headers={'User-Agent':'Candidate campaign publication audit'}), timeout=25) as r:
                          body = r.read()
                          is_pdf = route.endswith('.pdf')
                          results.append({'route': route or 'index.html','status': r.status,'bytes': len(body),'content_type': r.headers.get_content_type(),'signature_ok': body.startswith(b'%PDF') if is_pdf else (b'<html' in body[:500].lower() or b'<!doctype html' in body[:500].lower())})
                  except Exception as exc:
                      results.append({'route': route or 'index.html','error': type(exc).__name__ + ': ' + str(exc)})
          passed = bool(results) and all(r.get('status') == 200 and r.get('signature_ok') for r in results)
          audit = {'checked_at':'2026-07-16','configure_pages_outcome':page_outcome,'deploy_pages_outcome':deploy_outcome,'site_url':site_url if site_url.startswith('http') else None,'live_route_status':'passed' if passed else 'blocked','routes':results,'note':None if passed else 'Pages or the live route could not be independently verified.'}
          (root/'qa').mkdir(exist_ok=True)
          (root/'qa'/'publication-audit.json').write_text(json.dumps(audit, indent=2) + '\n')
          print(json.dumps(audit, indent=2))
          PY
      - id: browser_audit
        name: Run responsive and interaction audit
        if: steps.deployment.outcome == 'success'
        continue-on-error: true
        env:
          SITE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          python - <<'PY'
          import asyncio, json, os
          from pathlib import Path
          from playwright.async_api import async_playwright

          base = os.environ['SITE_URL'].rstrip('/') + '/'
          routes = ['', 'resume.html', 'cover-letter.html', 'interview-brief.html', '90-day-plan.html', 'agent-load-path-review.html', 'contribution-case.html']
          viewports = {'desktop':{'width':1440,'height':900},'laptop':{'width':1280,'height':800},'tablet':{'width':768,'height':1024},'mobile':{'width':390,'height':844},'narrow':{'width':320,'height':800}}
          out = Path('qa'); shots = out/'screenshots'; shots.mkdir(parents=True, exist_ok=True)

          async def main():
              findings=[]; renders=[]; interaction={}; official={}
              async with async_playwright() as p:
                  browser = await p.chromium.launch(executable_path='/usr/bin/google-chrome', args=['--no-sandbox'])
                  for viewport_name, viewport in viewports.items():
                      context = await browser.new_context(viewport=viewport)
                      for route in routes:
                          page = await context.new_page(); console_errors=[]
                          page.on('console', lambda msg, bucket=console_errors: bucket.append(msg.text) if msg.type == 'error' else None)
                          response = await page.goto(base+route, wait_until='domcontentloaded', timeout=45000); await page.wait_for_timeout(250)
                          title=await page.title(); body_text=(await page.locator('body').inner_text()).strip()
                          geometry=await page.evaluate('() => ({scrollWidth:document.documentElement.scrollWidth,clientWidth:document.documentElement.clientWidth,scrollHeight:document.documentElement.scrollHeight,clientHeight:document.documentElement.clientHeight})')
                          broken=await page.locator('img').evaluate_all('(imgs)=>imgs.filter(i=>!i.complete||i.naturalWidth===0).map(i=>i.getAttribute("src"))')
                          ok=bool(response and response.status==200 and title and len(body_text)>120 and geometry['scrollWidth']<=geometry['clientWidth']+1 and not broken and not console_errors)
                          item={'viewport':viewport_name,'route':route or 'index.html','status':response.status if response else None,'title':title,'body_chars':len(body_text),'geometry':geometry,'broken_images':broken,'console_errors':console_errors,'passed':ok}
                          renders.append(item)
                          if not ok: findings.append(item)
                          if route=='' and viewport_name in ('desktop','mobile','narrow'):
                              await page.screenshot(path=str(shots/f'campaign-{viewport_name}.jpg'), type='jpeg', quality=62, full_page=False)
                          await page.close()
                      await context.close()

                  context=await browser.new_context(viewport=viewports['desktop']); page=await context.new_page(); await page.goto(base,wait_until='domcontentloaded',timeout=45000)
                  await page.get_by_role('button',name='Finance exception triage').click(); finance=(await page.locator('.posture-value').inner_text()).strip(); finance_hold=await page.locator('.contract-state[data-state="hold"]').count()
                  await page.get_by_role('button',name='Healthcare intake').click(); health=(await page.locator('.posture-value').inner_text()).strip()
                  await page.get_by_role('button',name='Retail inventory exception').focus(); await page.keyboard.press('Enter'); retail=(await page.locator('.posture-value').inner_text()).strip()
                  interaction['scenario_flow']={'finance':finance,'finance_hold_contracts':finance_hold,'healthcare':health,'retail_keyboard':retail,'passed':finance=='HOLD FOR AUTHORITY DESIGN' and finance_hold>=1 and health=='HUMAN-FIRST WITH AUDIT TRACE' and retail=='SHADOW + HUMAN APPROVAL'}
                  await page.close(); await context.close()

                  context=await browser.new_context(viewport=viewports['mobile']); page=await context.new_page(); await page.goto(base,wait_until='domcontentloaded',timeout=45000); await page.get_by_role('button',name='Menu').click()
                  interaction['mobile_menu']={'open_class':await page.locator('.nav-links.open').count()==1,'nav_visible':await page.get_by_role('link',name='Operating model').is_visible()}; interaction['mobile_menu']['passed']=interaction['mobile_menu']['open_class'] and interaction['mobile_menu']['nav_visible']
                  await page.close(); await context.close()

                  context=await browser.new_context(viewport=viewports['desktop'],reduced_motion='reduce'); page=await context.new_page(); await page.goto(base,wait_until='domcontentloaded',timeout=45000)
                  animation=await page.locator('.crossing-plane').first.evaluate('(el)=>getComputedStyle(el).animationName'); replay=await page.locator('[data-crossing-replay]').evaluate('(el)=>getComputedStyle(el).display'); interaction['reduced_motion']={'animation_name':animation,'replay_display':replay,'passed':animation=='none' and replay=='none'}
                  await page.close(); await context.close()

                  context=await browser.new_context(viewport=viewports['desktop']); page=await context.new_page()
                  try:
                      response=await page.goto('https://www.accenture.com/us-en/about/company-index',wait_until='domcontentloaded',timeout=90000); await page.wait_for_timeout(3500)
                      await page.screenshot(path=str(shots/'accenture-official-reference.jpg'),type='jpeg',quality=58,full_page=False)
                      official={'url':page.url,'status':response.status if response else None,'title':await page.title(),'body_chars':len((await page.locator('body').inner_text()).strip()),'screenshot':'qa/screenshots/accenture-official-reference.jpg'}; official['passed']=official['status']==200 and 'accenture' in official['title'].lower() and official['body_chars']>500
                  except Exception as exc: official={'passed':False,'error':type(exc).__name__+': '+str(exc)}
                  await page.close(); await context.close(); await browser.close()

              report={'checked_at':'2026-07-16','browser_path':'GitHub-hosted Playwright using preinstalled Google Chrome; in-app Browser plugin was not available','site_url':base,'viewports':viewports,'render_checks':len(renders),'render_passes':sum(1 for r in renders if r['passed']),'findings':findings,'interaction':interaction,'official_reference':official,'screenshots':['qa/screenshots/campaign-desktop.jpg','qa/screenshots/campaign-mobile.jpg','qa/screenshots/campaign-narrow.jpg','qa/screenshots/accenture-official-reference.jpg'],'status':'passed' if len(findings)==0 and all(v.get('passed') for v in interaction.values()) and official.get('passed') else 'failed'}
              (out/'browser-audit.json').write_text(json.dumps(report,indent=2)+'\n'); print(json.dumps(report,indent=2))
          asyncio.run(main())
          PY
      - name: Record workflow outcomes
        if: always()
        env:
          PAGES_OUTCOME: ${{ steps.pages.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          PUBLICATION_AUDIT_OUTCOME: ${{ steps.publication_audit.outcome }}
          BROWSER_AUDIT_OUTCOME: ${{ steps.browser_audit.outcome }}
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          data={k.lower():os.environ.get(k,'unknown') for k in ['PAGES_OUTCOME','DEPLOY_OUTCOME','PUBLICATION_AUDIT_OUTCOME','BROWSER_AUDIT_OUTCOME']}
          Path('qa').mkdir(exist_ok=True); Path('qa/workflow-outcomes.json').write_text(json.dumps(data,indent=2)+'\n')
          PY
      - name: Commit publication and browser audit
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add qa/publication-audit.json qa/workflow-outcomes.json docs/*.pdf artifact-manifest.json qa/validation.json
          test ! -f qa/browser-audit.json || git add qa/browser-audit.json
          test ! -d qa/screenshots || git add qa/screenshots
          git diff --cached --quiet || git commit -m "Record live campaign QA"
          git push
